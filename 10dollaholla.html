<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>$10 Dolla Holla • KornDog Records</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="styles.css" />
  <script defer src="script.js"></script>

  <!-- 🔥 SHARE PREVIEW -->
  <meta property="og:title" content="💿 $10 Dolla Holla — KornDog Records" />
  <meta property="og:description" content="Every record on this page is $10. Stack 3 for $25 🔥" />
  <meta property="og:image" content="https://korndogrecords.com/images/Screenshot_20250831-144625.png" />
  <meta property="og:url" content="https://korndogrecords.com/10dollaholla.html" />
  <meta property="og:type" content="website" />

  <style>
    body {
      background:#060010;
      color:#fff;
      font-family:Barlow, sans-serif;
    }

    .wrap {
      max-width:1100px;
      margin:auto;
      padding:2rem 1rem;
    }

    h1 {
      font-family:'Bebas Neue',sans-serif;
      font-size:3rem;
      color:#7bff5a;
      text-align:center;
      letter-spacing:.1em;
      margin-bottom:.5rem;
    }

    .sub {
      text-align:center;
      color:#aaa;
      margin-bottom:1.2rem;
      font-size:.9rem;
    }

    /* 🔥 DEAL BANNER */
    .deal-banner {
      text-align:center;
      background:rgba(123,255,90,.12);
      border:1px solid rgba(123,255,90,.4);
      color:#7bff5a;
      padding:.9rem;
      border-radius:12px;
      margin-bottom:1.5rem;
      font-family:'Bebas Neue',sans-serif;
      letter-spacing:.08em;
      font-size:1.2rem;
    }

    .deal-banner span {
      display:block;
      font-size:.7rem;
      color:#c8ffc0;
      font-family:'DM Mono', monospace;
    }

    /* 📣 SHARE BUTTON */
    .share-btn {
      display:block;
      margin:0 auto 1.5rem;
      padding:.5rem 1rem;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.15);
      font-size:.8rem;
      cursor:pointer;
    }

    .share-btn:hover {
      background:rgba(123,255,90,.15);
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
      gap:1.2rem;
    }

    .card {
      background:#110028;
      border:1px solid rgba(255,255,255,.1);
      border-radius:14px;
      overflow:hidden;
      transition:.2s;
    }

    .card:hover {
      transform:translateY(-4px);
      box-shadow:0 10px 30px rgba(0,0,0,.4);
    }

    .card img {
      width:100%;
      aspect-ratio:1/1;
      object-fit:cover;
    }

    .info {
      padding:.7rem;
    }

    .title {
      font-size:.85rem;
      font-weight:600;
    }

    .price {
      color:#7bff5a;
      font-weight:700;
      margin-top:.3rem;
    }

    /* 💿 DEAL PILL */
    .deal-pill {
      margin-top:.4rem;
      font-size:.7rem;
      font-family:'DM Mono', monospace;
      background:rgba(123,255,90,.15);
      border:1px solid rgba(123,255,90,.4);
      color:#7bff5a;
      padding:.25rem .6rem;
      border-radius:999px;
      display:inline-block;
    }

    .btn {
      display:block;
      text-align:center;
      margin-top:.6rem;
      padding:.4rem;
      border-radius:999px;
      background:#7bff5a;
      color:#000;
      font-size:.8rem;
      font-weight:700;
    }

    /* 🧲 STICKY BAR */
    .sticky-deal {
      position:fixed;
      bottom:1rem;
      left:50%;
      transform:translateX(-50%);
      background:#7bff5a;
      color:#000;
      padding:.7rem 1.4rem;
      border-radius:999px;
      font-family:'Bebas Neue',sans-serif;
      letter-spacing:.08em;
      font-size:1rem;
      box-shadow:0 8px 30px rgba(0,214,50,.4);
      z-index:999;
    }

  </style>
</head>

<body>

<div class="wrap">

  <h1>$10 DOLLA HOLLA</h1>

  <div class="sub">
    No overthinking. No excuses. Just $10 records. 💿🔥
  </div>

  <!-- 🔥 DEAL BANNER -->
  <div class="deal-banner">
    ANY 3 RECORDS → $25
    <span>Discount auto-applies in cart</span>
  </div>

  <!-- 📣 SHARE -->
  <button onclick="shareBin()" class="share-btn">
    📣 Share This Bin
  </button>

  <div class="grid" id="bin"></div>

</div>

<!-- 🧲 STICKY DEAL -->
<div class="sticky-deal">
  💿 Grab 3 → Pay $25
</div>

<script>
function shareBin() {
  const url = "https://korndogrecords.com/10dollaholla.html";

  if (navigator.share) {
    navigator.share({
      title: "$10 Dolla Holla — KornDog Records",
      text: "Every record is $10. Stack 3 for $25 🔥",
      url: url
    });
  } else {
    window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, "_blank");
  }
}

fetch("products.json")
  .then(res => res.json())
  .then(products => {

    const bin = document.getElementById("bin");

    const filtered = products.filter(p =>
      Number(p.price) === 10 &&
      p.available !== false &&
      p.sold !== true
    );

    if (!filtered.length) {
      bin.innerHTML = "<p style='text-align:center;color:#888;'>No $10 heat right now… check back soon 🔥</p>";
      return;
    }

    filtered.forEach(p => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <a href="product.html?pid=${p.id}">
          <img src="${p.imageFront || p.image}" alt="">
          <div class="info">
            <div class="title">${p.title}</div>
            <div class="price">$10</div>
            <div class="deal-pill">3 FOR $25</div>
            <div class="btn">View Record</div>
          </div>
        </a>
      `;

      bin.appendChild(card);
    });

  });
</script>

</body>
</html>
