<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>$10 Dolla Holla • KornDog Records</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="styles.css" />
  <script defer src="script.js"></script>

  <meta property="og:title" content="🖤 $10 Dolla Holla — KornDog Records" />
  <meta property="og:description" content="Every record on this page is $10. Stack 3 for $25 🔥" />
  <meta property="og:image" content="https://korndogrecords.com/images/Screenshot_20250831-144625.png" />
  <meta property="og:url" content="https://korndogrecords.com/10dollaholla.html" />
  <meta property="og:type" content="website" />

  <style>
    body {
      background: #060010;
      color: #fff;
      font-family: Barlow, sans-serif;
    }

    .wrap {
      max-width: 1100px;
      margin: auto;
      padding: 2rem 1rem 140px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      color: #7bff5a;
      text-align: center;
      letter-spacing: .1em;
      margin-bottom: .5rem;
      line-height: 1;
    }

    .sub {
      text-align: center;
      color: #aaa;
      margin-bottom: 1.2rem;
      font-size: .95rem;
    }

    .deal-banner {
      text-align: center;
      background: rgba(123,255,90,.12);
      border: 1px solid rgba(123,255,90,.4);
      color: #7bff5a;
      padding: .95rem;
      border-radius: 14px;
      margin-bottom: 1.25rem;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: .08em;
      font-size: 1.4rem;
      line-height: 1.1;
    }

    .deal-banner span {
      display: block;
      font-size: .78rem;
      color: #c8ffc0;
      font-family: 'DM Mono', monospace;
      margin-top: .25rem;
      letter-spacing: .05em;
    }

    .share-btn {
      display: block;
      margin: 0 auto 1.5rem;
      padding: .7rem 1.15rem;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.15);
      font-size: .9rem;
      color: #fff;
      cursor: pointer;
      transition: .2s ease;
    }

    .share-btn:hover {
      background: rgba(123,255,90,.15);
      border-color: rgba(123,255,90,.35);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
      gap: 1.2rem;
    }

    .card {
      background: #110028;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 18px;
      overflow: hidden;
      transition: .2s ease;
      box-shadow: 0 8px 28px rgba(0,0,0,.22);
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 34px rgba(0,0,0,.35);
    }

    .card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
    }

    .info {
      padding: .8rem;
    }

    .title {
      font-size: .92rem;
      font-weight: 700;
      line-height: 1.25;
      min-height: 2.4em;
    }

    .price {
      color: #7bff5a;
      font-weight: 800;
      margin-top: .35rem;
      font-size: 1rem;
    }

    .deal-pill {
      margin-top: .5rem;
      font-size: .75rem;
      font-family: 'DM Mono', monospace;
      background: rgba(123,255,90,.12);
      border: 1px solid rgba(123,255,90,.38);
      color: #7bff5a;
      padding: .3rem .7rem;
      border-radius: 999px;
      display: inline-block;
    }

    .btn {
      display: block;
      text-align: center;
      margin-top: .75rem;
      padding: .7rem;
      border-radius: 999px;
      background: #7bff5a;
      color: #000;
      font-size: .9rem;
      font-weight: 800;
      text-decoration: none;
    }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .page-btn {
      min-width: 40px;
      text-align: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      color: #fff;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,.12);
      user-select: none;
      transition: .2s ease;
    }

    .page-btn:hover {
      background: rgba(123,255,90,.12);
      border-color: rgba(123,255,90,.35);
    }

    .page-btn.active {
      background: #7bff5a;
      color: #000;
      border-color: #7bff5a;
      font-weight: 800;
    }

    .empty {
      text-align: center;
      color: #888;
      padding: 2rem 1rem;
    }

    .sticky-deal {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: #7bff5a;
      color: #000;
      padding: .8rem 1.5rem;
      border-radius: 999px;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: .08em;
      font-size: 1.15rem;
      box-shadow: 0 8px 30px rgba(0,214,50,.4);
      z-index: 999;
      display: none;
      max-width: calc(100vw - 24px);
      text-align: center;
      line-height: 1.05;
    }

    @media (max-width: 520px) {
      h1 {
        font-size: 2.5rem;
      }

      .deal-banner {
        font-size: 1.15rem;
      }

      .sticky-deal {
        font-size: 1rem;
        padding: .75rem 1.2rem;
      }
    }
  </style>
</head>

<body>

  <div class="wrap">

    <h1>$10 DOLLA HOLLA</h1>

    <div class="sub">
      No overthinking. No excuses. Just $10 records. 🖤🔥
    </div>

    <div class="deal-banner">
      ANY 3 RECORDS → $25
      <span>Discount auto-applies in cart</span>
    </div>

    <button onclick="shareBin()" class="share-btn">
      📣 Send this to a friend → they’ll thank you
    </button>

    <div class="grid" id="bin"></div>
    <div class="pagination" id="pagination"></div>

  </div>

  <div class="sticky-deal" id="stickyDeal">
    🖤 Grab 3 → Pay $25
  </div>

  <script>
    function shareBin() {
      const url = "https://korndogrecords.com/10dollaholla.html";

      if (navigator.share) {
        navigator.share({
          title: "$10 Dolla Holla — KornDog Records",
          text: "Every record is $10. Stack 3 for $25 🔥",
          url: url
        });
      } else {
        window.open(
          `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`,
          "_blank"
        );
      }
    }

    let allProducts = [];
    let currentPage = 1;
    const perPage = 8;

    function getProductId(product) {
      return product.id || product.pid || "";
    }

    function getProductImage(product) {
      if (product.imageFront) return product.imageFront;
      if (product.images && !Array.isArray(product.images) && product.images.front) return product.images.front;
      if (Array.isArray(product.images) && product.images.length) return product.images[0];
      return product.image || "";
    }

    function renderPage() {
      const bin = document.getElementById("bin");
      bin.innerHTML = "";

      if (!allProducts.length) {
        bin.innerHTML = "<div class='empty'>No $10 heat right now… check back soon 🔥</div>";
        return;
      }

      const start = (currentPage - 1) * perPage;
      const pageItems = allProducts.slice(start, start + perPage);

      pageItems.forEach(p => {
        const pid = getProductId(p);
        const image = getProductImage(p);

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <a href="product.html?pid=${encodeURIComponent(pid)}">
            <img src="${image}" alt="${(p.title || "Record").replace(/"/g, '&quot;')}">
            <div class="info">
              <div class="title">${p.title || "Untitled Record"}</div>
              <div class="price">$10</div>
              <div class="deal-pill">3 FOR $25</div>
              <div class="btn">View Record</div>
            </div>
          </a>
        `;

        bin.appendChild(card);
      });
    }

    function renderPagination() {
      const totalPages = Math.ceil(allProducts.length / perPage);
      const container = document.getElementById("pagination");
      container.innerHTML = "";

      if (totalPages <= 1) return;

      for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement("div");
        btn.className = "page-btn" + (i === currentPage ? " active" : "");
        btn.textContent = i;

        btn.onclick = () => {
          currentPage = i;
          renderPage();
          renderPagination();
          window.scrollTo({ top: 0, behavior: "smooth" });
        };

        container.appendChild(btn);
      }
    }

    function updateStickyDeal() {
      const sticky = document.getElementById("stickyDeal");
      if (!sticky) return;

      let cart = [];
      try {
        cart = JSON.parse(localStorage.getItem("korndog_cart_v1") || "[]");
      } catch (e) {
        cart = [];
      }

      const tenItems = cart.filter(item => Number(item.price) === 10);
      const tenQty = tenItems.reduce((sum, item) => sum + (Number(item.qty) || 0), 0);

      if (tenQty === 1) {
        sticky.textContent = "🖤 Add 2 more → unlock $25";
        sticky.style.display = "block";
      } else if (tenQty === 2) {
        sticky.textContent = "🖤 Add 1 more → unlock $25";
        sticky.style.display = "block";
      } else if (tenQty >= 3) {
        sticky.textContent = "🖤 Grab 3 → Pay $25";
        sticky.style.display = "block";
      } else {
        sticky.style.display = "none";
      }
    }

    fetch("products.json")
      .then(res => res.json())
      .then(products => {
        allProducts = products.filter(p =>
          Number(p.price) === 10 &&
          p.available !== false &&
          p.sold !== true
        );

        renderPage();
        renderPagination();
        updateStickyDeal();
      })
      .catch(() => {
        const bin = document.getElementById("bin");
        bin.innerHTML = "<div class='empty'>Couldn’t load the bin right now.</div>";
      });

    document.addEventListener("DOMContentLoaded", updateStickyDeal);
    window.addEventListener("storage", updateStickyDeal);
  </script>

</body>
</html>
