<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Thank You • Korndog Records</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
--bg:#050013;
--accent:#7bff5a;
--text:#f5f5ff;
--muted:#a1a1c5;
--card:#12052b;
--border:#2b1550;
--warn:#ffeb3b;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
min-height:100vh;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
color:var(--text);
background: radial-gradient(circle at top,#2a0a60 0,var(--bg) 55%);
}

header{
position:sticky;
top:0;
background:rgba(10,1,30,.9);
border-bottom:1px solid rgba(123,255,90,.25);
}

.nav-inner{
max-width:1000px;
margin:auto;
padding:12px 20px;
display:flex;
align-items:center;
gap:10px;
}

.logo-circle{
width:44px;
height:44px;
border-radius:50%;
overflow:hidden;
border:2px solid var(--accent);
}

.logo-circle img{
width:100%;
height:100%;
object-fit:cover;
}

main{
max-width:800px;
margin:auto;
padding:60px 20px;
text-align:center;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:20px;
padding:40px;
}

h1{
font-size:32px;
margin-bottom:10px;
}

p{
color:var(--muted);
margin-bottom:20px;
line-height:1.6;
}

.btn{
display:inline-block;
background:var(--accent);
color:#000;
font-weight:900;
padding:12px 26px;
border-radius:40px;
}

.small{
margin-top:10px;
font-size:14px;
color:var(--muted);
}

footer{
text-align:center;
padding:20px;
font-size:12px;
color:var(--muted);
}

footer strong{color:var(--accent)}

/* Zombie Kitty */

.zk-overlay{
position:fixed;
bottom:90px;
left:-420px;
display:flex;
align-items:flex-end;
gap:10px;
z-index:9999;
transition:left .6s ease;
}

.zk-overlay.active{left:20px;}

.zk-kitty{
width:140px;
animation:wave 1.2s infinite ease-in-out;
transform-origin:top right;
}

@keyframes wave{
0%{transform:rotate(0)}
25%{transform:rotate(8deg)}
50%{transform:rotate(-8deg)}
75%{transform:rotate(6deg)}
100%{transform:rotate(0)}
}

.zk-bubble{
background:#ffeb3b;
color:#000;
padding:14px 18px;
font-weight:900;
border-radius:12px;
max-width:260px;
position:relative;
}

.zk-tail{
position:absolute;
left:-12px;
bottom:18px;
width:0;
height:0;
border-left:12px solid #ffeb3b;
border-top:12px solid transparent;
border-bottom:12px solid transparent;
}

.zk-actions{
margin-top:8px;
display:flex;
gap:6px;
flex-wrap:wrap;
}

.zk-actions a{
background:#000;
color:#ffeb3b;
padding:6px 12px;
border-radius:999px;
font-size:13px;
font-weight:900;
}
</style>
</head>

<body>

<header>
<div class="nav-inner">
<div class="logo-circle">
<img src="images/Screenshot_20250831-144625.png">
</div>
</div>
</header>

<main>
<div class="card">

<h1>Payment Complete ✅</h1>

<p>
Your order has been received.<br>
Joey is packing your vinyl now.
</p>

<a class="btn" href="shop.html">Back to Shop</a>

<div class="small">
Zombie Kitty will escort you back in a moment…
</div>

</div>
</main>

<footer>
© 2025 <strong>Korndog Records</strong> • Vinyl Therapy Never Dies
</footer>

<!-- Zombie Kitty -->

<div id="zkOverlay" class="zk-overlay">

<img src="images/3817.png" class="zk-kitty">

<div class="zk-bubble" id="zkBubble">
<div class="zk-tail"></div>
</div>

</div>

<script>

(function(){

const overlay=document.getElementById("zkOverlay");
const bubble=document.getElementById("zkBubble");

let seconds=6;

function render(){

bubble.innerHTML=
'<div class="zk-tail"></div>'+
'Yo! I’m <strong>Zombie Kitty</strong> 🧟‍🐱<br><br>'+
'<strong>THANK YOU</strong> for your order!<br>'+
'Heading back to the shop in <strong>'+seconds+'s</strong>'+
'<div class="zk-actions">'+
'<a href="shop.html">Shop More Wax</a>'+
'<a href="index.html">Home</a>'+
'</div>';

}

function runKitty(){

overlay.classList.add("active");

render();

const timer=setInterval(()=>{

seconds--;

if(seconds<=0){

clearInterval(timer);

overlay.classList.remove("active");

setTimeout(()=>{

window.location.replace("shop.html");

},600);

}

else{

render();

}

},1000);

}

runKitty();

window.addEventListener("pageshow",runKitty);

})();

</script>

</body>
</html>
