<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Shop Vinyl • KornDog Records</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Prevents Discogs CDN from blocking hotlinked images on desktop -->
  <meta name="referrer" content="no-referrer" />

  <!-- IMPORTANT: Your repo uses styles.css (plural). -->
  <link rel="stylesheet" href="styles.css?v=1210">
  <!-- Shop-only fixes (modal + flip) -->
  <link rel="stylesheet" href="shop.css?v=1210">

  <!-- 🔒 SHOP-ONLY HEADER LOGO FIX (DO NOT MOVE) -->
  <style>
    header .logo-link{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      height:100%;
    }

    header .logo-circle{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    header .logo-circle img{
      display:block;
    }

    /* Mobile Chrome micro-offset fix */
    @media (max-width:768px){
      header .logo-circle{
        transform: translateY(-1px);
      }
    }
  </style>

  <!-- Load order matters -->
  <script defer src="script.js?v=1210"></script>
  <script defer src="shop-ui.js?v=1210"></script>
  <script defer src="share-links.js?v=1210"></script>
  <script defer src="zk.js?v=1210"></script>
</head>

<body>
  <header>
    <div class="nav-inner">
      <a href="index.html" class="logo-link" aria-label="KornDog Records Home">
        <div class="logo-circle">
          <img src="images/Screenshot_20250831-144625.png" alt="KornDog Records logo" />
        </div>
      </a>

      <nav>
        <a href="index.html" class="nav-link">Home</a>
        <a href="shop.html" class="nav-link active">Shop</a>
        <a href="cart.html" class="nav-link cart-pill">
          Cart <span data-cart-count>0</span>
        </a>
      </nav>
    </div>
  </header>

  <main class="page">
    <h2>Shop Vinyl</h2>
    <p class="subtitle">Hand-picked records. Graded honestly. First paid gets it.</p>

    <div id="products" class="products-grid" aria-live="polite"></div>
    <div id="pagination" class="pagination" aria-label="Shop pagination"></div>
  </main>

  <footer>
    © 2025 <strong>KornDog Records</strong> · Vinyl Therapy Never Dies.
  </footer>

  <!-- Floating Contact -->
  <a id="floatingJoey" class="floating-message" aria-label="Contact Joey">💬</a>

  <!-- Zombie Kitty Assistant -->
  <div id="zkOverlay" class="zk-overlay">
    <img src="images/3817.png" class="zk-kitty" alt="Zombie Kitty" />
    <div class="zk-bubble" id="zkBubble">
      <div class="zk-tail"></div>
      Hi! I'm Zombie Kitty — your crate-digging assistant.<br><br>
      Tap here to text KornDog.
    </div>
  </div>

  <!-- Quick View Modal is injected by shop-ui.js -->

  <script>
    // Fix Discogs images on desktop — set referrerpolicy on every img as it's added to DOM
    (function(){
      function patchImgs(root){
        root.querySelectorAll("img").forEach(function(img){
          if(!img.referrerPolicy || img.referrerPolicy !== "no-referrer"){
            img.referrerPolicy = "no-referrer";
          }
        });
      }
      // Patch any imgs already in the DOM
      patchImgs(document);
      // Watch for dynamically added imgs (product cards, modal, etc.)
      new MutationObserver(function(mutations){
        mutations.forEach(function(m){
          m.addedNodes.forEach(function(node){
            if(node.nodeType === 1){
              if(node.tagName === "IMG") node.referrerPolicy = "no-referrer";
              else patchImgs(node);
            }
          });
        });
      }).observe(document.body, { childList: true, subtree: true });
    })();
  </script>
</body>
</html>
